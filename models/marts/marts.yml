version: 2

models:
  - name: dim_attio__companies
    description: >
      One row per company. Pivoted attributes + note count + owner name.
      Extend with attio__company_custom_attributes var for workspace-specific fields.
    columns:
      - name: company_id
        tests: [not_null, unique]

  - name: dim_attio__people
    description: >
      One row per person (contact). Pivoted attributes + note count + owner name.
      Extend with attio__person_custom_attributes var for workspace-specific fields.
    columns:
      - name: person_id
        tests: [not_null, unique]

  - name: fct_attio__deals
    description: >
      One row per deal record with resolved status labels and owner details.
      Extend with attio__deal_custom_attributes var for workspace-specific fields.
    columns:
      - name: deal_id
        tests: [not_null, unique]

  - name: fct_attio__notes
    description: All notes across all object types with author and record context.
    columns:
      - name: note_id
        tests: [not_null, unique]

  - name: fct_attio__list_entries
    description: >
      One row per list entry — the pipeline grain. Join to dim_attio__companies
      or dim_attio__people via record_id depending on the list's object_id.
    columns:
      - name: entry_id
        tests: [not_null, unique]
