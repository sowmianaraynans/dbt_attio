name: dbt_attio
version: "0.1.0"
config-version: 2

require-dbt-version: ">=1.3.0,<2.0.0"

profile: dbt_attio

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

seeds:
  dbt_attio:
    +schema: attio  # seeds land in 'attio' schema, matching sources.yml

models:
  dbt_attio:
    staging:
      +materialized: view
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table

vars:
  # Source location — override to point at your Fivetran schema
  attio_schema: "attio"
  attio_database: null   # defaults to target.database when null

  # Standard Attio object slugs — override if your workspace uses different names
  attio__company_object_slug: "companies"
  attio__person_object_slug: "people"
  attio__deal_object_slug: "deals"

  # Enable/disable optional mart models — set to false if your workspace doesn't use them
  attio__using_deals: true
  attio__using_notes: true
  attio__using_lists: true

  # Add workspace-specific custom attribute slugs here to include them in pivots
  attio__company_custom_attributes: []   # e.g. ['arr', 'tier', 'industry']
  attio__person_custom_attributes: []    # e.g. ['persona', 'seniority']
  attio__deal_custom_attributes: []      # e.g. ['close_reason', 'product_line']
